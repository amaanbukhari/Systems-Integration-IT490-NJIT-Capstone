<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playlist | THIS IS MUSIC</title>

<style>
:root{
--ink:#07111f;
--ink2:#0d1d34;
--panel:rgba(10,23,42,.74);
--panelSoft:rgba(255,255,255,.06);
--line:rgba(188,218,255,.18);
--blue:#2d74ff;
--blueSoft:#7fc1ff;
--mint:#79f0cf;
--text:#eef5ff;
--muted:rgba(238,245,255,.72);
--shadow:0 24px 80px rgba(0,0,0,.42);
--danger:#ff8ca8;
--success:#79f0cf;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:"Trebuchet MS","Avenir Next",sans-serif;
color:var(--text);
background:
radial-gradient(900px 520px at 12% 12%, rgba(127,193,255,.18), transparent 58%),
radial-gradient(900px 520px at 88% 20%, rgba(121,240,207,.12), transparent 60%),
linear-gradient(180deg,var(--ink),var(--ink2));
min-height:100vh;
padding:28px;
}

.page{
max-width:1180px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-radius:22px;
background:rgba(255,255,255,.04);
border:1px solid var(--line);
box-shadow:var(--shadow);
margin-bottom:24px;
gap:16px;
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:42px;
height:42px;
border-radius:14px;
background:
linear-gradient(145deg,var(--mint),transparent 35%),
linear-gradient(135deg,var(--blue),var(--blueSoft));
}

.navActions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 16px;
border-radius:999px;
border:1px solid var(--line);
background:rgba(255,255,255,.06);
color:var(--text);
text-decoration:none;
font-weight:700;
cursor:pointer;
transition:transform .18s ease, background .18s ease, border-color .18s ease;
white-space:nowrap;
}

.btn:hover{
transform:translateY(-1px);
background:rgba(255,255,255,.12);
}

.btn.primary{
background:linear-gradient(135deg,var(--blue),var(--blueSoft));
border:none;
}

.btn.secondary{
background:rgba(255,255,255,.06);
border:1px solid var(--line);
}

.btn.danger{
border-color:rgba(255,140,168,.28);
background:rgba(255,140,168,.10);
color:var(--danger);
}

.section{
border-radius:30px;
border:1px solid var(--line);
background:var(--panel);
padding:32px;
box-shadow:var(--shadow);
margin-bottom:24px;
}

.userBadge{
display:inline-flex;
align-items:center;
gap:8px;
padding:8px 12px;
border-radius:999px;
background:rgba(255,255,255,.05);
border:1px solid var(--line);
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:14px;
}

.heroRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
flex-wrap:wrap;
}

.heroLeft{
display:flex;
gap:18px;
align-items:flex-start;
}

.playlistArt{
width:128px;
height:128px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
flex-shrink:0;
background:
linear-gradient(145deg, rgba(127,193,255,.18), rgba(121,240,207,.10)),
rgba(255,255,255,.05);
border:1px solid var(--line);
box-shadow:var(--shadow);
}

.heroText h1{
font-family:Georgia,"Times New Roman",serif;
font-size:42px;
margin:0 0 10px;
line-height:1.05;
word-break:break-word;
}

.heroText p{
margin:0;
color:var(--muted);
line-height:1.7;
}

.statsRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:18px;
}

.statChip{
padding:10px 14px;
border-radius:999px;
border:1px solid var(--line);
background:rgba(255,255,255,.05);
color:var(--muted);
font-size:13px;
}

.feedback{
margin-top:18px;
padding:14px 16px;
border-radius:18px;
border:1px solid var(--line);
background:rgba(255,255,255,.04);
display:none;
font-size:14px;
}

.feedback.success{
display:block;
border-color:rgba(121,240,207,.28);
background:rgba(121,240,207,.08);
color:var(--success);
}

.feedback.error{
display:block;
border-color:rgba(255,140,168,.28);
background:rgba(255,140,168,.08);
color:var(--danger);
}

.listSection{
border-radius:30px;
border:1px solid var(--line);
background:var(--panel);
padding:24px;
box-shadow:var(--shadow);
}

.sectionHeader{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:14px;
}

.sectionHeader h2{
margin:0;
font-size:24px;
}

.muted{
color:var(--muted);
font-size:14px;
}

.songList{
display:flex;
flex-direction:column;
gap:8px;
margin-top:18px;
}

.songRow{
display:flex;
align-items:center;
gap:14px;
padding:10px 14px;
border-radius:14px;
background:rgba(255,255,255,.04);
border:1px solid transparent;
transition:background .15s ease, border-color .15s ease;
}

.songRow:hover{
background:rgba(255,255,255,.08);
border-color:var(--line);
}

.songIndex{
width:28px;
text-align:center;
color:var(--muted);
font-size:13px;
flex-shrink:0;
}

.songArt{
width:52px;
height:52px;
border-radius:8px;
object-fit:cover;
flex-shrink:0;
background:rgba(255,255,255,.08);
}

.songMain{
flex:1;
min-width:0;
}

.songTitle{
font-size:15px;
font-weight:700;
margin:0 0 3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.songMeta{
font-size:12px;
color:var(--muted);
margin:0;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.songActions{
display:flex;
gap:8px;
align-items:center;
flex-wrap:wrap;
}

.emptyState{
margin-top:18px;
padding:24px;
border-radius:20px;
border:1px dashed var(--line);
background:rgba(255,255,255,.03);
color:var(--muted);
text-align:center;
line-height:1.7;
}

@media(max-width:760px){
.heroLeft{
flex-direction:column;
}

.playlistArt{
width:110px;
height:110px;
font-size:44px;
}

.heroText h1{
font-size:34px;
}

.songRow{
align-items:flex-start;
flex-wrap:wrap;
}

.songActions{
width:100%;
}

.songIndex{
width:auto;
}
}
</style>
</head>

<body>
<div class="page">

<header class="topbar">
  <div class="brand">
    <div class="logo"></div>
    <div>
      <strong>THIS IS MUSIC</strong><br>
      <span style="font-size:12px;color:var(--muted)">Playlist view</span>
    </div>
  </div>

  <div class="navActions">
    <a class="btn" id="homeLink" href="/home">Home</a>
    <a class="btn secondary" id="likedLink" href="/liked">Liked Songs</a>
    <a class="btn secondary" id="playlistsLink" href="/playlists">Playlists</a>
  </div>
</header>

<section class="section">
  <div class="userBadge" id="userBadge">Playlist</div>

  <div class="heroRow">
    <div class="heroLeft">
      <div class="playlistArt">🎵</div>

      <div class="heroText">
        <h1 id="playlistTitle">Playlist</h1>
        <p id="playlistSubtitle">Your saved tracks live here.</p>

        <div class="statsRow">
          <div class="statChip" id="songCountChip">0 songs</div>
          <div class="statChip" id="playlistIdChip">Playlist</div>
        </div>
      </div>
    </div>

    <div class="heroActions">
      <a class="btn secondary" id="backToPlaylistsLink" href="/playlists">Back to Playlists</a>
    </div>
  </div>

  <div class="feedback" id="feedbackBox"></div>
</section>

<section class="listSection">
  <div class="sectionHeader">
    <h2>Songs</h2>
    <span class="muted">Tracks currently in this playlist</span>
  </div>

  <div id="songList" class="songList"></div>

  <div id="emptyState" class="emptyState" style="display:none;">
    This playlist is empty right now. Go to Home or Liked Songs and add something to it.
  </div>
</section>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("username");
const playlistId = params.get("id");

const homeLink = document.getElementById("homeLink");
const likedLink = document.getElementById("likedLink");
const playlistsLink = document.getElementById("playlistsLink");
const backToPlaylistsLink = document.getElementById("backToPlaylistsLink");
const userBadge = document.getElementById("userBadge");
const playlistTitle = document.getElementById("playlistTitle");
const playlistSubtitle = document.getElementById("playlistSubtitle");
const songCountChip = document.getElementById("songCountChip");
const playlistIdChip = document.getElementById("playlistIdChip");
const feedbackBox = document.getElementById("feedbackBox");
const songList = document.getElementById("songList");
const emptyState = document.getElementById("emptyState");

if (username) {
  homeLink.href = `/home?username=${encodeURIComponent(username)}`;
  likedLink.href = `/liked?username=${encodeURIComponent(username)}`;
  playlistsLink.href = `/playlists?username=${encodeURIComponent(username)}`;
  backToPlaylistsLink.href = `/playlists?username=${encodeURIComponent(username)}`;
  userBadge.textContent = username;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function showFeedback(message, type = "success") {
  feedbackBox.className = `feedback ${type}`;
  feedbackBox.textContent = message;
}

function getPlaylists() {
  return JSON.parse(localStorage.getItem("playlists") || "[]");
}

function savePlaylists(playlists) {
  localStorage.setItem("playlists", JSON.stringify(playlists));
}

function getPlaylistById(id) {
  return getPlaylists().find(playlist => String(playlist.id) === String(id));
}

function removeSongFromPlaylist(songId) {
  const playlists = getPlaylists();
  const playlist = playlists.find(item => String(item.id) === String(playlistId));

  if (!playlist) {
    showFeedback("Playlist not found.", "error");
    return;
  }

  const targetSong = playlist.songs.find(song => String(song.song_id) === String(songId));

  if (!targetSong) {
    showFeedback("Song not found in this playlist.", "error");
    return;
  }

  playlist.songs = playlist.songs.filter(song => String(song.song_id) !== String(songId));
  savePlaylists(playlists);
  showFeedback(`Removed "${targetSong.track_name || "song"}" from "${playlist.name}".`);
  renderPlaylist();
}

function renderPlaylist() {
  if (!playlistId) {
    playlistTitle.textContent = "Playlist not found";
    playlistSubtitle.textContent = "No playlist id was provided in the URL.";
    playlistIdChip.textContent = "Missing ID";
    songCountChip.textContent = "0 songs";
    songList.innerHTML = "";
    emptyState.style.display = "block";
    emptyState.textContent = "This page needs a playlist id to load correctly.";
    return;
  }

  const playlist = getPlaylistById(playlistId);

  if (!playlist) {
    playlistTitle.textContent = "Playlist not found";
    playlistSubtitle.textContent = "This playlist may have been deleted or never created.";
    playlistIdChip.textContent = `ID ${playlistId}`;
    songCountChip.textContent = "0 songs";
    songList.innerHTML = "";
    emptyState.style.display = "block";
    emptyState.textContent = "We couldn't find that playlist.";
    return;
  }

  playlistTitle.textContent = playlist.name || "Untitled Playlist";
  playlistSubtitle.textContent = playlist.songs.length
    ? `A custom collection with ${playlist.songs.length} saved track${playlist.songs.length === 1 ? "" : "s"}.`
    : "A fresh playlist waiting for its first song.";
  playlistIdChip.textContent = `Playlist ID: ${playlist.id}`;
  songCountChip.textContent = `${playlist.songs.length} song${playlist.songs.length === 1 ? "" : "s"}`;

  if (!playlist.songs.length) {
    songList.innerHTML = "";
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";

  songList.innerHTML = playlist.songs.map((song, index) => `
    <div class="songRow">
      <div class="songIndex">${index + 1}</div>

      <img
        class="songArt"
        src="${escapeHtml(song.artwork_url || "")}"
        alt="${escapeHtml(song.track_name || "Artwork")}"
      >

      <div class="songMain">
        <p class="songTitle">${escapeHtml(song.track_name || "Unknown Track")}</p>
        <p class="songMeta">
          ${escapeHtml(song.artist_name || "Unknown Artist")} • ${escapeHtml(song.album_name || "Unknown Album")}
        </p>
      </div>

      <div class="songActions">
        ${song.track_view_url ? `
          <a class="btn primary" href="${song.track_view_url}" target="_blank" rel="noopener noreferrer">Open</a>
        ` : ""}
        <button class="btn danger" type="button" onclick="removeSongFromPlaylist('${escapeHtml(song.song_id || "")}')">Remove</button>
      </div>
    </div>
  `).join("");
}

renderPlaylist();
</script>

</body>
</html>
